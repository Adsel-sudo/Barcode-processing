version: "3.9"

services:
  barcode-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: barcode-processing:latest
    container_name: barcode-processing
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      OUTPUT_BASE_DIR: "/data/outputs"
      TEMP_DIR: "/data/tmp"
    volumes:
      - ./data:/data
    restart: unless-stopped
